<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>느좋 - 관리자 페이지</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --point-color: #00FF41;
            --bg-dark: #0A0A0A;
            --card-bg: #141414;
            --input-bg: #1F1F1F;
            --text-main: #FFFFFF;
            --text-dim: #A0A0A0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        /* 로그인 화면 */
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #333;
        }

        .login-container h1 {
            color: var(--point-color);
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 1rem;
            font-family: 'Pretendard', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--point-color);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.1);
        }

        .login-btn {
            width: 100%;
            background: var(--point-color);
            color: black;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0, 255, 65, 0.3);
        }

        .error-message {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }

        /* 관리자 대시보드 */
        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .header h1 {
            color: var(--point-color);
            font-size: 2rem;
            margin: 0;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--text-dim);
            color: var(--text-dim);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            border-color: var(--point-color);
            color: var(--point-color);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #333;
        }

        .stat-card h3 {
            margin: 0 0 10px 0;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .stat-card .number {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--point-color);
            margin: 0;
        }

        /* 필터 */
        .filters {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--card-bg);
            border: 1px solid #333;
            color: var(--text-dim);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: var(--point-color);
            color: black;
            border-color: var(--point-color);
        }

        /* 지원자 테이블 */
        .table-container {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid #333;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #222;
        }

        th {
            background: #0f0f0f;
            color: var(--point-color);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        td {
            color: var(--text-main);
            font-size: 0.9rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: #1a1a1a;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-pending {
            background: #ffa50044;
            color: #ffa500;
        }

        .status-approved {
            background: #00ff4144;
            color: #00ff41;
        }

        .status-rejected {
            background: #ff444444;
            color: #ff4444;
        }

        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            margin-right: 5px;
            transition: all 0.2s;
        }

        .approve-btn {
            background: var(--point-color);
            color: black;
        }

        .reject-btn {
            background: #ff4444;
            color: white;
        }

        .action-btn:hover {
            transform: scale(1.05);
        }

        .loading {
            text-align: center;
            color: var(--text-dim);
            padding: 40px;
        }

        .no-data {
            text-align: center;
            color: var(--text-dim);
            padding: 40px;
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .table-container {
                overflow-x: auto;
            }

            table {
                min-width: 800px;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- 로그인 화면 -->
    <div class="login-container" id="loginContainer">
        <h1>🔐 관리자 로그인</h1>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="loginPassword" placeholder="비밀번호를 입력하세요" autofocus>
        </div>
        <button class="login-btn" id="loginBtn">로그인</button>
        <div class="error-message" id="errorMessage">비밀번호가 올바르지 않습니다.</div>
    </div>

    <!-- 관리자 대시보드 -->
    <div class="dashboard" id="dashboard">
        <div class="header">
            <h1>느좋 7기 지원자 관리</h1>
            <button class="logout-btn" id="logoutBtn">로그아웃</button>
        </div>

        <!-- 통계 -->
        <div class="stats">
            <div class="stat-card">
                <h3>전체 지원자</h3>
                <p class="number" id="totalCount">0</p>
            </div>
            <div class="stat-card">
                <h3>대기 중</h3>
                <p class="number" id="pendingCount">0</p>
            </div>
            <div class="stat-card">
                <h3>승인됨</h3>
                <p class="number" id="approvedCount">0</p>
            </div>
            <div class="stat-card">
                <h3>거절됨</h3>
                <p class="number" id="rejectedCount">0</p>
            </div>
        </div>

        <!-- 필터 -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">전체</button>
            <button class="filter-btn" data-filter="pending">대기 중</button>
            <button class="filter-btn" data-filter="approved">승인됨</button>
            <button class="filter-btn" data-filter="rejected">거절됨</button>
        </div>

        <!-- 지원자 테이블 -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>지원일</th>
                        <th>이름/나이/성별</th>
                        <th>연락처</th>
                        <th>학교/전공</th>
                        <th>거주지</th>
                        <th>상태</th>
                        <th>액션</th>
                    </tr>
                </thead>
                <tbody id="applicantsTable">
                    <tr>
                        <td colspan="7" class="loading">데이터 로딩 중...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Firebase SDK (Lite version for simple usage) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>

    <script>
        let currentFilter = 'all';
        let applicationsData = [];
        const ADMIN_PASSWORD = 'ydp12000';

        // 페이지 로드 시 로그인 상태 확인
        window.addEventListener('DOMContentLoaded', function () {
            if (sessionStorage.getItem('adminLoggedIn') === 'true') {
                showDashboard();
            }
        });

        // 로그인 처리
        document.getElementById('loginBtn').addEventListener('click', function () {
            const password = document.getElementById('loginPassword').value;
            const errorMessage = document.getElementById('errorMessage');

            if (password === ADMIN_PASSWORD) {
                // 간단한 비밀번호 체크 (Firebase Auth 제외)
                sessionStorage.setItem('adminLoggedIn', 'true');
                errorMessage.style.display = 'none';
                showDashboard();
            } else {
                errorMessage.textContent = '비밀번호가 올바르지 않습니다.';
                errorMessage.style.display = 'block';
                document.getElementById('loginPassword').value = '';
                document.getElementById('loginPassword').focus();
            }
        });

        // 로그아웃
        document.getElementById('logoutBtn').addEventListener('click', function () {
            sessionStorage.removeItem('adminLoggedIn');
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginPassword').value = '';
        });

        // 대시보드 표시
        function showDashboard() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            loadApplications();
        }

        // 지원서 데이터 로드
        async function loadApplications() {
            try {
                // Firestore에서 데이터 가져오기 (Auth 없이)
                const snapshot = await db.collection('applications')
                    .orderBy('createdAt', 'desc')
                    .get();

                applicationsData = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));

                updateStats();
                renderTable();
            } catch (error) {
                console.error('Error loading applications:', error);
                document.getElementById('applicantsTable').innerHTML =
                    '<tr><td colspan="7" class="no-data">데이터 로드 중 오류가 발생했습니다.</td></tr>';
            }
        }

        // 통계 업데이트
        function updateStats() {
            document.getElementById('totalCount').textContent = applicationsData.length;
            document.getElementById('pendingCount').textContent =
                applicationsData.filter(a => a.status === 'pending').length;
            document.getElementById('approvedCount').textContent =
                applicationsData.filter(a => a.status === 'approved').length;
            document.getElementById('rejectedCount').textContent =
                applicationsData.filter(a => a.status === 'rejected').length;
        }

        // 테이블 렌더링
        function renderTable() {
            const tbody = document.getElementById('applicantsTable');
            const filteredData = currentFilter === 'all'
                ? applicationsData
                : applicationsData.filter(a => a.status === currentFilter);

            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="no-data">지원자가 없습니다.</td></tr>';
                return;
            }

            tbody.innerHTML = filteredData.map(app => {
                const date = app.createdAt ?
                    new Date(app.createdAt.toDate()).toLocaleDateString('ko-KR') :
                    new Date(app.timestamp).toLocaleDateString('ko-KR');

                return `
                <tr>
                    <td>${date}</td>
                    <td>${app.identification}</td>
                    <td>${app.contact}</td>
                    <td>${app.academic}</td>
                    <td>${app.location.station || '미선택'}</td>
                    <td>
                        <span class="status-badge status-${app.status}">
                            ${app.status === 'pending' ? '대기' :
                        app.status === 'approved' ? '승인' : '거절'}
                        </span>
                    </td>
                    <td>
                        ${app.status === 'pending' ? `
                            <button class="action-btn approve-btn" onclick="updateStatus('${app.id}', 'approved')">
                                승인
                            </button>
                            <button class="action-btn reject-btn" onclick="updateStatus('${app.id}', 'rejected')">
                                거절
                            </button>
                        ` : ''}
                    </td>
                </tr>
            `;
            }).join('');
        }

        // 상태 업데이트
        window.updateStatus = async function (id, status) {
            try {
                await db.collection('applications').doc(id).update({ status });
                await loadApplications();
            } catch (error) {
                console.error('Error updating status:', error);
                alert('상태 업데이트 중 오류가 발생했습니다.');
            }
        };

        // 필터 버튼
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderTable();
            });
        });

        // Enter 키로 로그인
        document.getElementById('loginPassword').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
    </script>

</body>

</html>
